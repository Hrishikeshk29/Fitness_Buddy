{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo">💪</div>
      <h3 class="fw-bold">Join Fitness Buddy</h3>
      <p class="text-muted">Start your AI-powered fitness journey today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-at"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required minlength="6">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
        <i class="bi bi-rocket-takeoff-fill me-2"></i>Create Account
      </button>
    </form>

    <p class="text-center mt-3 text-muted">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
