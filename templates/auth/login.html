{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo">💪</div>
      <h3 class="fw-bold">Welcome Back!</h3>
      <p class="text-muted">Log in to continue your fitness journey</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

    <p class="text-center mt-3 text-muted">
      New here?
      <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
